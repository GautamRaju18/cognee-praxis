[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [".venv", ".data_storage", ".cognee_system", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E402"]  # config must set env vars before cognee imports

[tool.ruff.lint.per-file-ignores]
"backend/praxis/routers/*" = ["B008"]  # FastAPI Depends() in defaults is the idiom

[tool.black]
line-length = 100
extend-exclude = "\\.venv|\\.data_storage|\\.cognee_system|frontend"
