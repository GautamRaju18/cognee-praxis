[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend"]
asyncio_mode = "auto"
# cognee holds asyncio locks bound to the loop that first used it — every test
# must run on ONE shared loop (see backend/tests/conftest.py).
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [".venv", ".data_storage", ".cognee_system", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E402"]  # config must set env vars before cognee imports

[tool.ruff.lint.per-file-ignores]
"backend/praxis/routers/*" = ["B008"]  # FastAPI Depends() in defaults is the idiom

[tool.black]
line-length = 100
extend-exclude = "\\.venv|\\.data_storage|\\.cognee_system|frontend"
